<!DOCTYPE html>
<html>
<head>
<title>eFootball Elite League</title>

<style>

body{
font-family:Arial;
margin:0;
background:#020b1a;
color:white;
text-align:center;
}

/* star background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.3;
z-index:-1;
}

/* header */

header{
background:#001f54;
padding:20px;
font-size:30px;
font-weight:bold;
}

/* navigation */

nav{
background:#002a72;
padding:10px;
}

nav button{
margin:5px;
padding:10px 20px;
font-size:16px;
border:none;
background:#0d6efd;
color:white;
cursor:pointer;
}

nav button:hover{
background:#1f7dff;
}

/* sections */

.section{
display:none;
padding:20px;
}

/* table */

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
color:black;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#0d6efd;
color:white;
}

input,select{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<header>
⚽ eFootball Elite League
</header>

<nav>

<button onclick="showPage('tablePage')">League Table</button>

<button onclick="showPage('fixturesPage')">Fixtures</button>

<button onclick="adminLogin()">Admin</button>

</nav>

<!-- TABLE -->

<div id="tablePage" class="section">

<h2>League Table</h2>

<table id="leagueTable">

<tr>
<th>Pos</th>
<th>Player</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>

</table>

</div>

<!-- FIXTURES -->

<div id="fixturesPage" class="section">

<h2>Fixtures</h2>

<p>Fixtures will be generated for the season.</p>

</div>

<!-- ADMIN -->

<div id="adminPage" class="section">

<h2>Admin Panel</h2>

<select id="homeTeam"></select>

<input type="number" id="homeGoals" placeholder="Goals">

<select id="awayTeam"></select>

<input type="number" id="awayGoals" placeholder="Goals">

<br><br>

<button onclick="addResult()">Add Result</button>

</div>

<script>

/* PLAYERS */

let teams=[

{name:"Young Moni",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Superiorous",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"EME-RE",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Rich Pious",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Teekay RM",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Gakiza",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Maze-30",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Play Dem",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Lord Emperor",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Kugordaea",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Hamza",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"PHL Dyke",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Mudathir1",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Chris01",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Bigi001",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Guest Player",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}

];

/* SHOW PAGE */

function showPage(page){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");

document.getElementById(page).style.display="block";

}

/* ADMIN PASSWORD */

function adminLogin(){

let pass=prompt("Enter Admin Password");

if(pass==="elite123"){

showPage("adminPage");

}

else{

alert("Wrong password");

}

}

/* LOAD TEAMS */

function loadTeams(){

let select1=document.getElementById("homeTeam");

let select2=document.getElementById("awayTeam");

teams.forEach(team=>{

let option=document.createElement("option");

option.text=team.name;

select1.add(option.cloneNode(true));

select2.add(option);

});

}

/* TABLE */

function renderTable(){

let table=document.getElementById("leagueTable");

table.innerHTML=`

<tr>
<th>Pos</th>
<th>Player</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>

`;

teams.sort((a,b)=>b.pts-a.pts);

teams.forEach((team,i)=>{

let gd=team.gf-team.ga;

table.innerHTML+=`

<tr>

<td>${i+1}</td>

<td>${team.name}</td>

<td>${team.p}</td>

<td>${team.w}</td>

<td>${team.d}</td>

<td>${team.l}</td>

<td>${team.gf}</td>

<td>${team.ga}</td>

<td>${gd}</td>

<td>${team.pts}</td>

</tr>

`;

});

}

/* ADD RESULT */

function addResult(){

let home=document.getElementById("homeTeam").value;

let away=document.getElementById("awayTeam").value;

let hg=parseInt(document.getElementById("homeGoals").value);

let ag=parseInt(document.getElementById("awayGoals").value);

let h=teams.find(t=>t.name===home);

let a=teams.find(t=>t.name===away);

h.p++; a.p++;

h.gf+=hg;

h.ga+=ag;

a.gf+=ag;

a.ga+=hg;

if(hg>ag){

h.w++;

a.l++;

h.pts+=3;

}

else if(ag>hg){

a.w++;

h.l++;

a.pts+=3;

}

else{

h.d++;

a.d++;

h.pts++;

a.pts++;

}

renderTable();

}

/* START */

loadTeams();

renderTable();

showPage("tablePage");

</script>

</body>
</html>
