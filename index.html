<!DOCTYPE html>
<html>
<head>

<title>eFootball Elite League</title>

<style>

body{
font-family:Arial;
margin:0;
background:#020b1a;
color:white;
text-align:center;
}

/* football star background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.25;
z-index:-1;
}

header{
background:#001f54;
padding:20px;
font-size:30px;
font-weight:bold;
}

nav{
background:#002a72;
padding:10px;
}

nav button{
margin:5px;
padding:10px 18px;
font-size:16px;
border:none;
background:#0d6efd;
color:white;
cursor:pointer;
}

.section{
display:none;
padding:20px;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
color:black;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#0d6efd;
color:white;
}

.news{
background:white;
color:black;
padding:15px;
margin:20px auto;
width:80%;
border-radius:8px;
}

</style>

</head>

<body>

<header>
⚽ eFootball Elite League
</header>

<nav>

<button onclick="showPage('tablePage')">League Table</button>
<button onclick="showPage('fixturesPage')">Fixtures</button>
<button onclick="showPage('resultsPage')">Results</button>
<button onclick="showPage('newsPage')">News</button>
<button onclick="adminLogin()">Admin</button>

</nav>

<!-- TABLE -->

<div id="tablePage" class="section">

<h2>League Table</h2>

<table id="leagueTable"></table>

</div>

<!-- FIXTURES -->

<div id="fixturesPage" class="section">

<h2>Season Fixtures</h2>

<div id="fixtures"></div>

</div>

<!-- RESULTS -->

<div id="resultsPage" class="section">

<h2>Match Results</h2>

<div id="results"></div>

</div>

<!-- NEWS -->

<div id="newsPage" class="section">

<h2>League News</h2>

<div class="news">

<h3>Season Kickoff</h3>

<p>The eFootball Elite League season begins with 16 players competing for the championship title.</p>

</div>

</div>

<!-- ADMIN -->

<div id="adminPage" class="section">

<h2>Admin Panel</h2>

<select id="matchSelect"></select>

<input type="number" id="homeGoals" placeholder="Home Goals">

<input type="number" id="awayGoals" placeholder="Away Goals">

<br><br>

<button onclick="addResult()">Add Result</button>

</div>

<script>

/* PLAYERS */

let teams=[
"Young Moni",
"Superiorous",
"EME-RE",
"Rich Pious",
"Teekay RM",
"Gakiza",
"Maze-30",
"Play Dem",
"Lord Emperor",
"Kugordaea",
"Hamza Burey",
"PHL Dyke",
"Mudathir1",
"Chris Levito",
"Tricks",
"Bigi001"
];

let table=[];

teams.forEach(name=>{
table.push({name,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
});

/* PAGE SWITCH */

function showPage(page){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");

document.getElementById(page).style.display="block";

}

/* ADMIN LOGIN */

function adminLogin(){

let pass=prompt("Admin Password");

if(pass==="elite123"){

showPage("adminPage");

}else{

alert("Wrong password");

}

}

/* TABLE */

function renderTable(){

let t=document.getElementById("leagueTable");

t.innerHTML=`

<tr>
<th>Pos</th>
<th>Player</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>
`;

table.sort((a,b)=>b.pts-a.pts);

table.forEach((team,i)=>{

let gd=team.gf-team.ga;

t.innerHTML+=`

<tr>

<td>${i+1}</td>

<td>${team.name}</td>

<td>${team.p}</td>

<td>${team.w}</td>

<td>${team.d}</td>

<td>${team.l}</td>

<td>${team.gf}</td>

<td>${team.ga}</td>

<td>${gd}</td>

<td>${team.pts}</td>

</tr>

`;

});

}

/* FIXTURE GENERATOR */

let fixtures=[];

function generateFixtures(){

let list=[...teams];

let rounds=list.length-1;

let half=list.length/2;

for(let r=0;r<rounds;r++){

let round=[];

for(let i=0;i<half;i++){

round.push({
home:list[i],
away:list[list.length-1-i]
});

}

fixtures.push(round);

list.splice(1,0,list.pop());

}

renderFixtures();

}

/* SHOW FIXTURES */

function renderFixtures(){

let f=document.getElementById("fixtures");

f.innerHTML="";

fixtures.forEach((round,i)=>{

f.innerHTML+=<h3>Matchday ${i+1}</h3>;

round.forEach(match=>{

f.innerHTML+=<p>${match.home} vs ${match.away}</p>;

});

});

loadMatchSelector();

}

/* ADMIN MATCH SELECT */

function loadMatchSelector(){

let s=document.getElementById("matchSelect");

fixtures.forEach((round,i)=>{

round.forEach(match=>{

let option=document.createElement("option");

option.value=match.home+"|"+match.away;

option.text=MD${i+1} : ${match.home} vs ${match.away};

s.add(option);

});

});

}

/* RESULTS */

function addResult(){

let value=document.getElementById("matchSelect").value;

let hg=parseInt(document.getElementById("homeGoals").value);

let ag=parseInt(document.getElementById("awayGoals").value);

let [home,away]=value.split("|");

let h=table.find(t=>t.name==home);

let a=table.find(t=>t.name==away);

h.p++; a.p++;

h.gf+=hg; h.ga+=ag;

a.gf+=ag; a.ga+=hg;

if(hg>ag){

h.w++; a.l++; h.pts+=3;

}else if(ag>hg){

a.w++; h.l++; a.pts+=3;

}else{

h.d++; a.d++; h.pts++; a.pts++;

}

/* result history */

document.getElementById("results").innerHTML+=

<p>${home} ${hg} - ${ag} ${away}</p>;

renderTable();

}

/* START */

generateFixtures();

renderTable();

showPage("tablePage");

</script>

</body>
</html>
