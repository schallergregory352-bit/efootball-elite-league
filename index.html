<!DOCTYPE html>
<html>

<head>

<title>eFootball Elite League</title>

<style>

body{
font-family:Arial;
margin:0;
color:white;
text-align:center;

background:#020824;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
background-position:0 0,25px 25px;
}

header{
padding:20px;
font-size:28px;
background:#001c54;
}

nav{
background:#002b80;
padding:10px;
}

nav button{
padding:10px;
margin:5px;
font-weight:bold;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

table{
margin:auto;
border-collapse:collapse;
width:95%;
background:white;
color:black;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#003399;
color:white;
}

</style>

</head>

<body>

<header>
🏆 eFootball Elite League
</header>

<nav>

<button onclick="showPage('tablePage')">League Table</button>
<button onclick="showPage('fixturesPage')">Full Fixtures</button>
<button onclick="showPage('adminPage')">Add Result</button>

</nav>

<div id="tablePage" class="section active">

<h2>League Table</h2>

<table id="leagueTable">

<tr>
<th>Player</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>

</table>

</div>

<div id="fixturesPage" class="section">

<h2>Full Season Fixtures (14 Matchweeks)</h2>

<div id="fixturesList"></div>

</div>

<div id="adminPage" class="section">

<h2>Enter Match Result</h2>

<select id="team1"></select>

<input type="number" id="score1" placeholder="Goals">

<select id="team2"></select>

<input type="number" id="score2" placeholder="Goals">

<button onclick="addResult()">Add Result</button>

</div>

<script>

let players=[
"Young Moni",
"Superioreats",
"EME-RE",
"Rich Pheus",
"Teekay KM",
"Gakiya",
"Maze-30",
"Play dem",
"Lord Emperorg",
"Kugorouaca",
"Hamza Gurley",
"Phil Dyke",
"Mudathiri",
"Chris Leviti",
"Tricks"
];

let stats=JSON.parse(localStorage.getItem("leagueStats"))||{};

players.forEach(p=>{
if(!stats[p]) stats[p]={P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,PTS:0};
});

function loadTeams(){

let t1=document.getElementById("team1");
let t2=document.getElementById("team2");

players.forEach(p=>{

let o1=document.createElement("option");
o1.text=p;
t1.add(o1);

let o2=document.createElement("option");
o2.text=p;
t2.add(o2);

});

}

function addResult(){

let team1=document.getElementById("team1").value;
let team2=document.getElementById("team2").value;

let s1=parseInt(document.getElementById("score1").value);
let s2=parseInt(document.getElementById("score2").value);

if(team1===team2) return alert("Teams must be different");

stats[team1].P++;
stats[team2].P++;

stats[team1].GF+=s1;
stats[team1].GA+=s2;

stats[team2].GF+=s2;
stats[team2].GA+=s1;

stats[team1].GD=stats[team1].GF-stats[team1].GA;
stats[team2].GD=stats[team2].GF-stats[team2].GA;

if(s1>s2){

stats[team1].W++;
stats[team1].PTS+=3;
stats[team2].L++;

}

else if(s2>s1){

stats[team2].W++;
stats[team2].PTS+=3;
stats[team1].L++;

}

else{

stats[team1].D++;
stats[team2].D++;

stats[team1].PTS+=1;
stats[team2].PTS+=1;

}

localStorage.setItem("leagueStats",JSON.stringify(stats));

renderTable();

}

function renderTable(){

let table=document.getElementById("leagueTable");

table.innerHTML=`<tr>
<th>Player</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>`;

players.sort((a,b)=>stats[b].PTS-stats[a].PTS||stats[b].GD-stats[a].GD);

players.forEach(p=>{

let row=table.insertRow();

row.insertCell(0).innerText=p;
row.insertCell(1).innerText=stats[p].P;
row.insertCell(2).innerText=stats[p].W;
row.insertCell(3).innerText=stats[p].D;
row.insertCell(4).innerText=stats[p].L;
row.insertCell(5).innerText=stats[p].GF;
row.insertCell(6).innerText=stats[p].GA;
row.insertCell(7).innerText=stats[p].GD;
row.insertCell(8).innerText=stats[p].PTS;

});

}

function generateFixtures(){

let teams=[...players];

if(teams.length%2!==0){
teams.push("BYE");
}

let rounds=teams.length-1;
let matches=teams.length/2;

let html="";

for(let r=0;r<rounds;r++){

html+="<h3>Matchweek "+(r+1)+"</h3>";

for(let m=0;m<matches;m++){

let home=teams[m];
let away=teams[teams.length-1-m];

if(home!=="BYE" && away!=="BYE"){
html+=home+" vs "+away+"<br>";
}
else{
let byeTeam=home==="BYE"?away:home;
html+="<i>"+byeTeam+" (Bye Week)</i><br>";
}

}

html+="<br>";

teams.splice(1,0,teams.pop());

}

document.getElementById("fixturesList").innerHTML=html;

}

function showPage(page){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

document.getElementById(page).classList.add("active");

}

loadTeams();
renderTable();
generateFixtures();

</script>

</body>

</html>
