<!DOCTYPE html>
<html>
<head>
<title>eFootball Elite League</title>

<style>

body{
font-family:Arial;
margin:0;
background:#020b1a;
color:white;
text-align:center;
}

/* header */

header{
background:#001f54;
padding:20px;
font-size:32px;
font-weight:bold;
}

/* navigation */

nav{
background:#002a72;
padding:10px;
}

nav button{
margin:5px;
padding:10px 20px;
font-size:16px;
border:none;
background:#0d6efd;
color:white;
cursor:pointer;
}

nav button:hover{
background:#1f7dff;
}

.section{
display:none;
padding:20px;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
color:black;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#0d6efd;
color:white;
}

input,select{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<header>
⚽ eFootball Elite League
</header>

<nav>

<button onclick="showPage('tablePage')">League Table</button>

<button onclick="showPage('fixturesPage')">Match History</button>

<button onclick="adminLogin()">Admin</button>

</nav>

<!-- TABLE -->

<div id="tablePage" class="section">

<h2>League Table</h2>

<table id="leagueTable"></table>

</div>

<!-- MATCH HISTORY -->

<div id="fixturesPage" class="section">

<h2>Match History</h2>

<table id="historyTable">

<tr>
<th>Home</th>
<th>Score</th>
<th>Away</th>
</tr>

</table>

</div>

<!-- ADMIN -->

<div id="adminPage" class="section">

<h2>Admin Panel</h2>

<select id="homeTeam"></select>

<input type="number" id="homeGoals" placeholder="Goals">

<select id="awayTeam"></select>

<input type="number" id="awayGoals" placeholder="Goals">

<br><br>

<button onclick="addResult()">Add Result</button>

<button onclick="resetLeague()">Reset League</button>

</div>

<script>

/* DEFAULT TEAMS */

const defaultTeams=[

{name:"Young Moni",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Superiorous",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"EME-RE",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Rich Phocus",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Teekay",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Gaki",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Maze-30",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Play Dem",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Lord Emperor09",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Kuqaraaca",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Hamza",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"PHL Dyke",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Mudathir1",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Chris01",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Bigi001",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},
{name:"Tricks",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}

];

let teams=JSON.parse(localStorage.getItem("league"))||defaultTeams;

let history=JSON.parse(localStorage.getItem("history"))||[];

/* SAVE */

function save(){

localStorage.setItem("league",JSON.stringify(teams));

localStorage.setItem("history",JSON.stringify(history));

}

/* SHOW PAGE */

function showPage(page){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");

document.getElementById(page).style.display="block";

}

/* ADMIN */

function adminLogin(){

let pass=prompt("Enter Admin Password");

if(pass==="elite123"){

showPage("adminPage");

}else{

alert("Wrong password");

}

}

/* LOAD TEAM SELECT */

function loadTeams(){

let home=document.getElementById("homeTeam");

let away=document.getElementById("awayTeam");

home.innerHTML="";

away.innerHTML="";

teams.forEach(t=>{

let o1=document.createElement("option");

o1.value=t.name;

o1.text=t.name;

home.appendChild(o1);

let o2=document.createElement("option");

o2.value=t.name;

o2.text=t.name;

away.appendChild(o2);

});

}

/* TABLE */

function renderTable(){

teams.sort((a,b)=>{

if(b.pts!==a.pts) return b.pts-a.pts;

let gdA=a.gf-a.ga;

let gdB=b.gf-b.ga;

if(gdB!==gdA) return gdB-gdA;

return b.gf-a.gf;

});

let html=`

<tr>

<th>Pos</th>

<th>Player</th>

<th>P</th>

<th>W</th>

<th>D</th>

<th>L</th>

<th>GF</th>

<th>GA</th>

<th>GD</th>

<th>Pts</th>

</tr>

`;

teams.forEach((t,i)=>{

let gd=t.gf-t.ga;

html+=`

<tr>

<td>${i+1}</td>

<td>${t.name}</td>

<td>${t.p}</td>

<td>${t.w}</td>

<td>${t.d}</td>

<td>${t.l}</td>

<td>${t.gf}</td>

<td>${t.ga}</td>

<td>${gd}</td>

<td>${t.pts}</td>

</tr>

`;

});

document.getElementById("leagueTable").innerHTML=html;

}

/* HISTORY */

function renderHistory(){

let table=document.getElementById("historyTable");

let html=`

<tr>

<th>Home</th>

<th>Score</th>

<th>Away</th>

</tr>

`;

history.forEach(m=>{

html+=`

<tr>

<td>${m.home}</td>

<td>${m.hg} - ${m.ag}</td>

<td>${m.away}</td>

</tr>

`;

});

table.innerHTML=html;

}

/* ADD RESULT */

function addResult(){

let home=document.getElementById("homeTeam").value;

let away=document.getElementById("awayTeam").value;

if(home===away){

alert("Teams cannot play themselves");

return;

}

let hg=parseInt(document.getElementById("homeGoals").value);

let ag=parseInt(document.getElementById("awayGoals").value);

if(isNaN(hg)||isNaN(ag)){

alert("Enter goals");

return;

}

let h=teams.find(t=>t.name===home);

let a=teams.find(t=>t.name===away);

h.p++; a.p++;

h.gf+=hg; h.ga+=ag;

a.gf+=ag; a.ga+=hg;

if(hg>ag){

h.w++; a.l++; h.pts+=3;

}else if(ag>hg){

a.w++; h.l++; a.pts+=3;

}else{

h.d++; a.d++; h.pts++; a.pts++;

}

/* save match */

history.push({home,away,hg,ag});

save();

renderTable();

renderHistory();

}

/* RESET */

function resetLeague(){

if(confirm("Reset League?")){

localStorage.clear();

location.reload();

}

}

/* START */

loadTeams();

renderTable();

renderHistory();

showPage("tablePage");

</script>

</body>
</html>
