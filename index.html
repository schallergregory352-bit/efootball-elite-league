<!DOCTYPE html>
<html>
<head>
<title>eFootball Elite League</title>

<style>

body{
font-family:Arial;
background:#021433;
color:white;
text-align:center;
margin:0;
}

header{
background:#001c48;
padding:20px;
font-size:28px;
font-weight:bold;
}

nav{
background:#002b70;
padding:10px;
}

nav button{
margin:5px;
padding:10px 18px;
border:none;
background:#0d6efd;
color:white;
cursor:pointer;
}

.section{
display:none;
padding:20px;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
color:black;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#0d6efd;
color:white;
}

input,select{
padding:8px;
margin:5px;
}

</style>
</head>

<body>

<header>⚽ eFootball Elite League</header>

<nav>

<button onclick="showPage('tablePage')">Table</button>
<button onclick="showPage('fixturesPage')">Fixtures</button>
<button onclick="showPage('resultsPage')">Results</button>
<button onclick="showPage('adminPage')">Admin</button>

</nav>

<!-- TABLE -->

<div id="tablePage" class="section">

<h2>League Table</h2>

<select onchange="switchSeason(this.value)">
<option value="1">Season 1</option>
<option value="2">Season 2</option>
</select>

<table id="leagueTable"></table>

</div>

<!-- FIXTURES -->

<div id="fixturesPage" class="section">

<h2>Fixtures</h2>

<div id="fixtures"></div>

</div>

<!-- RESULTS -->

<div id="resultsPage" class="section">

<h2>Results</h2>

<div id="results"></div>

</div>

<!-- ADMIN -->

<div id="adminPage" class="section">

<h2>Admin Login</h2>

<input type="password" id="adminPass" placeholder="Password">

<button onclick="login()">Login</button>

<div id="adminPanel" style="display:none">

<h3>Add Result</h3>

<select id="matchSelect"></select>

<input type="number" id="hg" placeholder="Home">

<input type="number" id="ag" placeholder="Away">

<button onclick="addResult()">Save Result</button>

<br><br>

<button onclick="resetSeason()">Reset Season</button>

</div>

</div>

<script>

/* PLAYERS */

let teams=[

"Young Moni",
"Superiorous",
"EME-RE",
"Rich Pious",
"Teekay RM",
"Gakiza",
"Maze-30",
"Play Dem",
"Lord Emperor",
"Kugordaea",
"Hamza Burey",
"PHL Dyke",
"Mudathir1",
"Chris Levito",
"Tricks",
"Bigi001"

];

let season=1;

/* LOAD DATA */

let saved=localStorage.getItem("leagueData");

let data=saved?JSON.parse(saved):{};

/* CREATE TABLE */

function createTable(){

let table=[];

teams.forEach(t=>{

table.push({

name:t,
p:0,w:0,d:0,l:0,
gf:0,ga:0,pts:0

});

});

return table;

}

if(!data["season1"]) data["season1"]={table:createTable(),results:[]};
if(!data["season2"]) data["season2"]={table:createTable(),results:[]};

/* SAVE */

function save(){

localStorage.setItem("leagueData",JSON.stringify(data));

}

/* PAGE SWITCH */

function showPage(p){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");

document.getElementById(p).style.display="block";

}

/* SWITCH SEASON */

function switchSeason(s){

season=parseInt(s);

renderTable();
renderResults();

}

/* TABLE */

function renderTable(){

let t=document.getElementById("leagueTable");

let table=data["season"+season].table;

table.sort((a,b)=>b.pts-a.pts);

t.innerHTML=`
<tr>
<th>Pos</th>
<th>Player</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>
`;

table.forEach((team,i)=>{

let gd=team.gf-team.ga;

t.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${team.name}</td>
<td>${team.p}</td>
<td>${team.w}</td>
<td>${team.d}</td>
<td>${team.l}</td>
<td>${team.gf}</td>
<td>${team.ga}</td>
<td>${gd}</td>
<td>${team.pts}</td>
</tr>
`;

});

}

/* FIXTURES */

let fixtures=[];

function generateFixtures(){

let list=[...teams];

let rounds=list.length-1;

let half=list.length/2;

for(let r=0;r<rounds;r++){

let round=[];

for(let i=0;i<half;i++){

round.push({
home:list[i],
away:list[list.length-1-i]
});

}

fixtures.push(round);

list.splice(1,0,list.pop());

}

renderFixtures();
loadMatchSelect();

}

function renderFixtures(){

let f=document.getElementById("fixtures");

fixtures.forEach((round,i)=>{

f.innerHTML+=<h3>Matchday ${i+1}</h3>;

round.forEach(m=>{

f.innerHTML+=<p>${m.home} vs ${m.away}</p>;

});

});

}

/* ADMIN */

function login(){

let p=document.getElementById("adminPass").value;

if(p==="elite123"){

document.getElementById("adminPanel").style.display="block";

}else{

alert("Wrong password");

}

}

/* MATCH SELECT */

function loadMatchSelect(){

let s=document.getElementById("matchSelect");

fixtures.forEach((round,i)=>{

round.forEach(m=>{

let o=document.createElement("option");

o.value=m.home+"|"+m.away;

o.text=MD${i+1}: ${m.home} vs ${m.away};

s.add(o);

});

});

}

/* ADD RESULT */

function addResult(){

let v=document.getElementById("matchSelect").value;

let hg=parseInt(document.getElementById("hg").value);

let ag=parseInt(document.getElementById("ag").value);

let [home,away]=v.split("|");

let table=data["season"+season].table;

let h=table.find(t=>t.name==home);

let a=table.find(t=>t.name==away);

h.p++;a.p++;

h.gf+=hg;h.ga+=ag;
a.gf+=ag;a.ga+=hg;

if(hg>ag){

h.w++;a.l++;h.pts+=3;

}else if(ag>hg){

a.w++;h.l++;a.pts+=3;

}else{

h.d++;a.d++;h.pts++;a.pts++;

}

data["season"+season].results.push(${home} ${hg}-${ag} ${away});

save();

renderTable();
renderResults();

}

/* RESULTS */

function renderResults(){

let r=document.getElementById("results");

r.innerHTML="";

data["season"+season].results.forEach(x=>{

r.innerHTML+=<p>${x}</p>;

});

}

/* RESET */

function resetSeason(){

if(confirm("Reset this season?")){

data["season"+season]={table:createTable(),results:[]};

save();

renderTable();
renderResults();

}

}

/* START */

generateFixtures();

renderTable();

renderResults();

showPage("tablePage");

</script>

</body>
</html>
